experiment:
  name: "slot_m_variation"
  description: "Test slot pool weight imputation across M dimension"
  task: "geology"

task:
  random:
    vocab_size: 256
  structured:
    num_states: 64
    chain_seed: 42
  geology:
    num_lithologies: 12
    seed: 42

model:
  d_model: 512
  num_heads: 8
  num_rounds: 3
  alpha: 0.1
  gamma: 0.3

training:
  steps: 500
  lr: 0.0005
  seq_len: 2048
  corruption_rate: 0.50
  vocab_size: 256

anchors:
  m_values: [16, 24, 32, 48, 64]
  seeds: [42, 123, 999]
  target_m: 32
  extrapolate_m: 96

imputation:
  interpolation_methods: ["linear", "spline", "krige"]
  variants:
    - name: "A_full"
      anchors: "all"
      interpolation: "linear"
      signal_only: false
      non_slot: "average"
    - name: "B_boundary"
      anchors: [16, 64]
      interpolation: "linear"
      signal_only: false
      non_slot: "average"
    - name: "C_signal"
      anchors: "all"
      interpolation: "linear"
      signal_only: true
      non_slot: "average"
    - name: "D_naive"
      anchors: [16, 64]
      interpolation: "linear"
      signal_only: false
      non_slot: "best"

validation:
  pp_batches: 10
  convergence_steps: 200
  device: "cpu"
  use_corrupted_eval: true

output:
  checkpoint_dir: "checkpoints/"
  report_path: "report.md"