experiment:
  name: "dff_variation"
  description: "Test MLP weight imputation across d_ff dimension (neuron sorting + linear upsampling)"

model:
  d_model: 768
  n_heads: 12
  n_layers: 12
  vocab_size: 50257
  max_seq_len: 1024

quick_test:
  d_model: 256
  n_heads: 4
  n_layers: 4
  vocab_size: 50257
  max_seq_len: 256
  d_ff: 256
  target_d_ff: 512
  steps: 500
  batch_size: 16
  seq_len: 256
  subset_tokens: 65536

training:
  steps: 20000
  lr: 0.0006
  batch_size: 8
  seq_len: 1024
  warmup_steps: 1000
  grad_clip: 1.0

d_ff_variation:
  source_d_ff: 2048
  target_d_ff: 4096
  quick_test_steps: 2000
  quick_test_subset_tokens: 32768

imputation:
  activation_batches: 10

validation:
  pp_batches: 20
  convergence_steps: 200

output:
  checkpoint_dir: "checkpoints_dff/"
  report_path: "dff_report.md"